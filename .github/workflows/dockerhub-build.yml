name: Build And Push ComfyUI Image

on:
  push:
    branches: [ "main" ]
    paths:
      - "Dockerfile"
      - "start.sh"
      - "prepare_context.sh"
      - "scripts/**"
      - "context/**"
      - ".github/workflows/dockerhub-build.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional Docker tag override (example: 2026-04-06-v2)"
        required: false
        default: ""
      push_latest:
        description: "Also push :latest"
        required: false
        type: boolean
        default: true

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Context Preflight
        run: |
          ./scripts/preflight_context.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve Image Metadata
        id: meta
        run: |
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          REPO="${{ vars.DOCKERHUB_REPO }}"
          if [ -z "$REPO" ]; then
            REPO="comfyui-runpod"
          fi

          TAG_INPUT="${{ github.event.inputs.image_tag }}"
          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            TAG="$(date -u +'%Y-%m-%d')-${GITHUB_SHA::7}"
          fi

          IMAGE="${USERNAME}/${REPO}"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "${IMAGE}:latest"
            elif [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build And Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Summary
        run: |
          echo "Pushed image: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event.inputs.push_latest }}" = "true" ]; then
            echo "Pushed image: ${{ steps.meta.outputs.image }}:latest" >> "$GITHUB_STEP_SUMMARY"
          fi
